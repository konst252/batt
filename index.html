<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Батарейки</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231e293b' stroke='%233b82f6' stroke-width='4'/><circle cx='50' cy='50' r='30' fill='%23eab308'/><rect x='45' y='12' width='10' height='10' rx='2' fill='%23eab308'/><path d='M50 30 V50 H65' stroke='%231e293b' stroke-width='5' stroke-linecap='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231e293b' stroke='%233b82f6' stroke-width='4'/><circle cx='50' cy='50' r='30' fill='%23eab308'/><rect x='45' y='12' width='10' height='10' rx='2' fill='%23eab308'/><path d='M50 30 V50 H65' stroke='%231e293b' stroke-width='5' stroke-linecap='round'/></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent-color: #3b82f6;
            --border-color: #334155;
            --text-muted: #94a3b8;
            --brand-color: #ffdd67;
            --cheap-color: #5ef3b7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-section {
            background-color: #1e293b;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            position: sticky;
            top: 5px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input {
            padding: 10px;
            font-size: 1rem;
            background-color: #0f172a;
            border: 1.5px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            outline: none;
            width: 100%;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .clear-btn {
            background-color: #334155;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
            font-size: 0.85rem;
            width: 100%;
        }

        .stats {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .battery-list {
            display: grid;
            gap: 10px;
        }

        .battery-card {
            background-color: #1e293b;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .renata-section {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }

        .renata-section span {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-right: 4px;
        }

        .size-badge {
            background-color: #0f172a;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid var(--border-color);
        }

        .rec-row {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .rec-item {
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .brand-rec {
            background-color: rgba(234, 179, 8, 0.08);
            border-left: 3px solid var(--brand-color);
        }

        .cheap-rec {
            background-color: rgba(16, 185, 129, 0.08);
            border-left: 3px solid var(--cheap-color);
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            text-transform: uppercase;
        }

        .val {
            font-weight: bold;
            color: #fff;
        }

        .specs-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 0.8rem;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        .highlight {
            background-color: rgba(59, 130, 246, 0.4);
            color: #fff;
            padding: 0 2px;
            border-radius: 3px;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            display: none;
        }
    </style>
</head>
<body>

    <div class="search-section">
        <div class="search-grid">
            <div class="form-group">
                <label>Поиск</label>
                <input type="text" id="searchInput" placeholder="377, SR626..." autocomplete="off">
            </div>
            <div class="form-group">
                <label>Диаметр</label>
                <input type="number" id="diamInput" step="0.1" placeholder="6.8">
            </div>
            <div class="form-group">
                <label>Высота</label>
                <input type="number" id="heightInput" step="0.05" placeholder="2.6">
            </div>
        </div>
        <button class="clear-btn" id="clearBtn">Сбросить</button>
    </div>

    <div class="stats" id="resultCounter">Загрузка...</div>

    <div class="battery-list" id="batteryList"></div>

            { renata: "395", iec: "SR927SW", ag: "AG7", lr: "LR927", size: "9.50 x 2.65", diameter: 9.5, height: 2.65, voltage: "1.55", capacity: "55", drain: "Low Drain", brandRec: "Renata 395, Maxell SR927SW", cheapRec: "Camelion AG7" },
            { renata: "396", iec: "SR726W", ag: "AG2", lr: "LR726", size: "7.90 x 2.65", diameter: 7.9, height: 2.65, voltage: "1.55", capacity: "30", drain: "High Drain", brandRec: "Renata 396, Maxell SR726W", cheapRec: "Camelion AG2" },
            { renata: "397", iec: "SR726SW", ag: "AG2", lr: "LR726", size: "7.90 x 2.65", diameter: 7.9, height: 2.65, voltage: "1.55", capacity: "30", drain: "Low Drain", brandRec: "Renata 397, Maxell SR726SW", cheapRec: "Camelion AG2" },
            { renata: "399", iec: "SR927W", ag: "AG7", lr: "LR927", size: "9.50 x 2.65", diameter: 9.5, height: 2.65, voltage: "1.55", capacity: "55", drain: "High Drain", brandRec: "Renata 399, Maxell SR927W", cheapRec: "Camelion AG7" }
        ];

        const searchInput = document.getElementById('searchInput');
        const diamInput = document.getElementById('diamInput');
        const heightInput = document.getElementById('heightInput');
        const clearBtn = document.getElementById('clearBtn');
        const batteryList = document.getElementById('batteryList');
        const noResults = document.getElementById('noResults');
        const resultCounter = document.getElementById('resultCounter');

        function renderList(data, highlightText = '') {
            batteryList.innerHTML = '';
            if (data.length === 0) {
                noResults.style.display = 'block';
                resultCounter.textContent = 'Найдено: 0';
                return;
            }
            noResults.style.display = 'none';
            resultCounter.textContent = `Найдено: ${data.length}`;

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'battery-card';

                const renataText = highlight(item.renata, highlightText);
                const iecText = highlight(item.iec, highlightText);
                const agText = highlight(item.ag, highlightText);
                const lrText = highlight(item.lr, highlightText);
                const sizeText = highlight(item.size, highlightText);

                card.innerHTML = `
                    <div class="card-header">
                        <div class="renata-section"><span>Renata</span>${renataText}</div>
                        <div class="size-badge">📐 ${sizeText} мм</div>
                    </div>
                    <div class="rec-row">
                        <div class="rec-item brand-rec">
                            <span class="label" style="color: #ffdd67;">👑 Брендовые / Дорогие:</span>
                            <span class="val">${item.brandRec}</span>
                        </div>
                        <div class="rec-item cheap-rec">
                            <span class="label" style="color: #5ef3b7;">🔋 Дешевые / Бюджетные:</span>
                            <span class="val">${item.cheapRec}</span>
                        </div>
                    </div>
                    <div class="specs-mini">
                        <div><span class="label">Код IEC / Seiko</span><span class="val" style="font-size:0.9rem;">${iecText}</span></div>
                        <div><span class="label">Аналог Alkaline</span><span class="val" style="font-size:0.9rem;">${agText} (${lrText})</span></div>
                        <div style="grid-column: span 2; margin-top: 4px; color: var(--text-muted);">
                            <span>Ток: <strong>${item.drain}</strong> | ${item.voltage}V | ${item.capacity} мАч</span>
                        </div>
                    </div>
                `;
                batteryList.appendChild(card);
            });
        }

        function highlight(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${escapeRegExp(search)})`, 'gi');
            return text.replace(regex, '<mark class="highlight">$1</mark>');
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function filterData() {
            const query = searchInput.value.trim().toLowerCase();
            const filterDiam = parseFloat(diamInput.value);
            const filterHeight = parseFloat(heightInput.value);

            const filtered = batteryData.filter(item => {
                const matchesQuery = !query || 
                                     item.renata.toLowerCase().includes(query) ||
                                     item.iec.toLowerCase().includes(query) ||
                                     item.ag.toLowerCase().includes(query) ||
                                     item.lr.toLowerCase().includes(query) ||
                                     item.size.toLowerCase().includes(query) ||
                                     item.brandRec.toLowerCase().includes(query) ||
                                     item.cheapRec.toLowerCase().includes(query);

                const matchesDiam = !filterDiam || Math.abs(item.diameter - filterDiam) <= 0.15;
                const matchesHeight = !filterHeight || Math.abs(item.height - filterHeight) <= 0.15;

                return matchesQuery && matchesDiam && matchesHeight;
            });

            renderList(filtered, query);
        }

        searchInput.addEventListener('input', filterData);
        diamInput.addEventListener('input', filterData);
        heightInput.addEventListener('input', filterData);

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            diamInput.value = '';
            heightInput.value = '';
            renderList(batteryData);
        });

        renderList(batteryData);
    </script>
</body>
</html>
